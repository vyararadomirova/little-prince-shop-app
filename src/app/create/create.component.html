<section class="form-page">
    <div class="stars"></div>

    <h1 class="form-title">Създай нов продукт</h1>

    <div class="form-card">
        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label>Име на продукта</label>
                <input type="text" [(ngModel)]="product.name" name="name" required>
            </div>

            <div class="form-group">
                <label>Кратко описание</label>
                <textarea [(ngModel)]="product.description" name="description" rows="3" placeholder="Кратко описание за каталога" required></textarea>
            </div>

            <div class="form-group">
                <label>Пълно описание</label>
                <textarea [(ngModel)]="product.content" name="content" rows="5" placeholder="Детайлно описание за страницата на продукта" required></textarea>
            </div>

            <div class="form-group">
                <label>Цена</label>
                <input type="number" step="0.01" [(ngModel)]="product.price" name="price" required>
            </div>

            <div class="form-group">
                <label>Снимка (URL)</label>
                <input type="text" [(ngModel)]="product.imageUrl" name="imageUrl" placeholder="Въведете линк към изображението">
            </div>

            @if (error) {
                <div class="error-message">{{ error }}</div>
            }

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" [disabled]="loading">
                    {{ loading ? 'Запазване...' : 'Създай продукт' }}
                </button>
                <a routerLink="/catalog" class="btn btn-secondary">Отказ</a>
            </div>
        </form>
    </div>
</section>
