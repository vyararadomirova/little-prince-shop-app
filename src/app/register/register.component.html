<section class="form-page">
    <div class="stars"></div>

    <div class="form-card">
        <h1 class="form-title">Регистрация</h1>
        <p class="auth-subtitle">Създайте профил и открийте нови малки планети</p>

        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label>Потребителско име</label>
                <input type="text" [(ngModel)]="username" name="username" placeholder="име" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" [(ngModel)]="email" name="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label>Парола</label>
                <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>Повтори паролата</label>
                <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
            </div>

            @if (error) {
                <div class="error-message">{{ error }}</div>
            }

            <button type="submit" class="btn btn-primary" [disabled]="loading">
                {{ loading ? 'Зареждане...' : 'Създай профил' }}
            </button>
        </form>

        <div class="auth-switch">
            <p>Вече имате профил? <a routerLink="/login">Вход</a></p>
        </div>
    </div>
</section>
