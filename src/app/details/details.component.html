<section class="details-page" *ngIf="product && !isLoading; else loadingOrNotFound">
    <div class="stars"></div>

    <div class="details-container">
        <div class="details-image">
            <img [src]="product.imageUrl" [alt]="product.name">
        </div>

        <div class="details-info">
            <h1>{{ product.name }}</h1>
            <p class="details-description">{{ product.description }}</p>
            
            <!-- ДОБАВИ ТОВА - за съдържанието -->
            <div class="details-content">
                <h3>За продукта:</h3>
                <p>{{ product.content }}</p>
            </div>
            
            <div class="details-price">{{ product.price }} евро</div>

            <div class="details-actions">
                <button class="hero-btn">Добави в кошницата</button>
                <button class="edit-btn">Редактирай</button>
                <button class="delete-btn">Изтрий</button>
            </div>
        </div>
    </div>
</section>

<ng-template #loadingOrNotFound>
    <div class="not-found" *ngIf="!isLoading && errorMessage; else loading">
        <h2>{{ errorMessage }}</h2>
        <a routerLink="/catalog">Обратно към каталога</a>
    </div>
    <ng-template #loading>
        <div class="loading">
            <h2>Зареждане...</h2>
        </div>
    </ng-template>
</ng-template>
