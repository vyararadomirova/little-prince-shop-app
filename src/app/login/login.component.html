<section class="form-page">
    <div class="stars"></div>

    <div class="form-card">
        <h1 class="form-title">Вход</h1>
        <p class="auth-subtitle">Добре дошли отново в света на Малкия принц</p>

        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label>Email</label>
                <input type="email" [(ngModel)]="email" name="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label>Парола</label>
                <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
            </div>

            @if (error) {
                <div class="error-message">{{ error }}</div>
            }

            <button type="submit" class="btn btn-primary" [disabled]="loading">
                {{ loading ? 'Зареждане...' : 'Влез' }}
            </button>
        </form>

        <div class="auth-switch">
            <p>Нямате профил? <a routerLink="/register">Регистрация</a></p>
        </div>
    </div>
</section>
