<section class="auth-page">
    <div class="stars"></div>

    <div class="auth-card">
        <h2>Вход</h2>
        <p class="auth-subtitle">
            Добре дошли отново в света на Малкия принц
        </p>

        <form (ngSubmit)="onSubmit()">
            <div class="input-group">
                <label>Email</label>
                <input 
                    type="email" 
                    [(ngModel)]="email" 
                    name="email"
                    placeholder="example@email.com"
                    required>
            </div>

            <div class="input-group">
                <label>Парола</label>
                <input 
                    type="password" 
                    [(ngModel)]="password" 
                    name="password"
                    placeholder="••••••••"
                    required>
            </div>

            @if (error) {
                <div class="error-message">
                    {{ error }}
                </div>
            }

            <button type="submit" class="hero-btn auth-btn" [disabled]="loading">
                {{ loading ? 'Зареждане...' : 'Влез' }}
            </button>
        </form>

        <p class="auth-switch">
            Нямате профил?
            <a routerLink="/register">Регистрация</a>
        </p>
    </div>
</section>
